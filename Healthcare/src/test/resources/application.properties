spring.application.name=Healthcare-test

# Tests must never use the developer's MySQL database.
spring.datasource.url=jdbc:h2:mem:careassist_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

jwt.secret=CareAssistJwtSecretKeyForHexawareProject1234567890
jwt.expiration=3600000

# Use harmless test OAuth values so the application context can start.
spring.security.oauth2.client.registration.github.client-id=test-client-id
spring.security.oauth2.client.registration.github.client-secret=test-client-secret
spring.security.oauth2.client.registration.github.scope=read:user,user:email

app.frontend-url=http://localhost:5173
app.cors.allowed-origins=http://localhost:5173
app.claim-documents.storage-dir=target/test-claim-documents

# Never send real email from automated tests.
app.mail.enabled=false
app.mail.from=no-reply@careassist.test
spring.mail.host=localhost
spring.mail.port=2525

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=30MB
